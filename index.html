<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Science 10-1 Biology Trainer</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
}

.container {
  width: 1600px;
  max-width: 99%;
  margin-top: 30px;
}

h1 { text-align: center; font-size: 44px; }

button {
  padding: 18px 26px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #2d6cdf;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

button:hover { background: #1b4fb3; }

.box {
  background: white;
  border-radius: 16px;
  padding: 35px;
  margin-top: 25px;
  box-shadow: 0 3px 15px rgba(0,0,0,0.1);
  font-size: 26px;
}

h3 { font-size: 34px; }

label {
  font-size: 26px;
  display: block;
  line-height: 2;
}

input[type="radio"] {
  transform: scale(1.6);
  margin-right: 12px;
}

.correct { color: green; font-size: 30px; font-weight: bold; }
.wrong { color: red; font-size: 30px; font-weight: bold; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 20px;
}

th, td {
  border: 1px solid #ddd;
  padding: 14px;
}

th { background: #f0f0f0; }

</style>
</head>

<body>

<div class="container">

<h1>Science 10-1 Biology Trainer</h1>

<button onclick="startSession()">Start Session</button>
<button onclick="nextQuestion()">Next Question</button>
<button onclick="resetData()">Reset Progress</button>

<h3>⏱ Stopwatch: <span id="time">0</span></h3>

<div id="quiz" class="box"></div>
<div id="feedback" class="box"></div>
<div id="explanation" class="box"></div>

<h2>📊 Performance History</h2>
<div id="history" class="box"></div>

</div>

<script>

const questions = [

/* ================= CELL THEORY (1–10) ================= */
{
q:"What is cell theory?",
options:["All living things are made of cells","Cells appear randomly","Only animals have cells","Cells are non-living"],
answer:"All living things are made of cells",
explanation:"All organisms are composed of cells.",
difficulty:"easy"
},
{
q:"Who first observed cells?",
options:["Robert Hooke","Newton","Darwin","Mendel"],
answer:"Robert Hooke",
explanation:"Hooke observed cork cells.",
difficulty:"easy"
},
{
q:"Who observed living microorganisms?",
options:["Leeuwenhoek","Einstein","Pasteur","Watson"],
answer:"Leeuwenhoek",
explanation:"He saw bacteria using microscopes.",
difficulty:"easy"
},
{
q:"What does a microscope do?",
options:["Magnifies objects","Kills bacteria","Creates cells","Moves organisms"],
answer:"Magnifies objects",
explanation:"It enlarges small structures.",
difficulty:"easy"
},
{
q:"What is the basic unit of life?",
options:["Cell","Tissue","Organ","Organ system"],
answer:"Cell",
explanation:"Cells are the smallest unit of life.",
difficulty:"easy"
},
{
q:"Cells come from?",
options:["Pre-existing cells","Dust","Air","Random formation"],
answer:"Pre-existing cells",
explanation:"Cells divide from existing cells.",
difficulty:"medium"
},
{
q:"What is magnification?",
options:["Making image larger","Making image smaller","Killing cells","Moving cells"],
answer:"Making image larger",
explanation:"Magnification increases size of image.",
difficulty:"easy"
},
{
q:"What is resolution?",
options:["Clarity of image","Size of cell","Weight of sample","Speed of microscope"],
answer:"Clarity of image",
explanation:"Resolution is image detail.",
difficulty:"medium"
},
{
q:"Electron microscopes use?",
options:["Light","Electrons","Water","Heat"],
answer:"Electrons",
explanation:"They use electron beams.",
difficulty:"medium"
},
{
q:"Light microscopes use?",
options:["Light","Electrons","Magnetism","Sound"],
answer:"Light",
explanation:"They use visible light.",
difficulty:"easy"
},

/* ================= ORGANELLES (11–25) ================= */
{
q:"Nucleus function?",
options:["Controls cell","Produces energy","Digests food","Stores water"],
answer:"Controls cell",
explanation:"It contains DNA.",
difficulty:"easy"
},
{
q:"Mitochondria function?",
options:["ATP production","Protein storage","Water transport","Cell wall formation"],
answer:"ATP production",
explanation:"Produces energy.",
difficulty:"easy"
},
{
q:"Ribosomes make?",
options:["Proteins","Fats","Water","DNA"],
answer:"Proteins",
explanation:"Protein synthesis occurs here.",
difficulty:"easy"
},
{
q:"Cell membrane is?",
options:["Selective barrier","Rigid wall","Energy source","Nucleus"],
answer:"Selective barrier",
explanation:"Controls entry and exit.",
difficulty:"medium"
},
{
q:"Cytoplasm is?",
options:["Gel fluid","Cell wall","DNA","Protein"],
answer:"Gel fluid",
explanation:"Holds organelles.",
difficulty:"easy"
},
{
q:"Chloroplasts do?",
options:["Photosynthesis","Respiration","Digestion","Movement"],
answer:"Photosynthesis",
explanation:"Capture sunlight.",
difficulty:"easy"
},
{
q:"Vacuole stores?",
options:["Water and nutrients","DNA","Proteins","Energy"],
answer:"Water and nutrients",
explanation:"Storage organelle.",
difficulty:"easy"
},
{
q:"Cell wall is in?",
options:["Plants","Animals","Bacteria only","Viruses"],
answer:"Plants",
explanation:"Provides support.",
difficulty:"easy"
},
{
q:"Golgi apparatus?",
options:["Packages proteins","Makes DNA","Stores water","Produces energy"],
answer:"Packages proteins",
explanation:"Modifies and ships proteins.",
difficulty:"medium"
},
{
q:"Endoplasmic reticulum?",
options:["Transport system","Energy site","DNA site","Waste removal"],
answer:"Transport system",
explanation:"Moves materials.",
difficulty:"medium"
},

/* ================= TRANSPORT (26–40) ================= */
{
q:"Diffusion is movement from?",
options:["High to low","Low to high","Requires energy","Random"],
answer:"High to low",
explanation:"Passive transport.",
difficulty:"easy"
},
{
q:"Osmosis is movement of?",
options:["Water","Sugar","Protein","Salt"],
answer:"Water",
explanation:"Across membrane.",
difficulty:"easy"
},
{
q:"Active transport requires?",
options:["ATP","No energy","Light","Heat"],
answer:"ATP",
explanation:"Energy required.",
difficulty:"medium"
},
{
q:"Cell membrane allows?",
options:["Selective transport","Everything","Nothing","Only water"],
answer:"Selective transport",
explanation:"Controls entry.",
difficulty:"medium"
},
{
q:"Endocytosis is?",
options:["Cell intake","Cell release","Photosynthesis","Respiration"],
answer:"Cell intake",
explanation:"Bringing substances in.",
difficulty:"hard"
},
{
q:"Exocytosis is?",
options:["Cell release","Cell intake","Diffusion","Osmosis"],
answer:"Cell release",
explanation:"Expels materials.",
difficulty:"hard"
},

/* ================= PLANTS (41–55) ================= */
{
q:"Xylem transports?",
options:["Water","Sugar","Oxygen","Proteins"],
answer:"Water",
explanation:"Upward transport.",
difficulty:"easy"
},
{
q:"Phloem transports?",
options:["Sugar","Water","CO2","Oxygen"],
answer:"Sugar",
explanation:"Food transport.",
difficulty:"easy"
},
{
q:"Stomata function?",
options:["Gas exchange","Support","Storage","Digestion"],
answer:"Gas exchange",
explanation:"Exchange gases.",
difficulty:"medium"
},
{
q:"Photosynthesis occurs in?",
options:["Chloroplast","Mitochondria","Nucleus","Vacuole"],
answer:"Chloroplast",
explanation:"Site of photosynthesis.",
difficulty:"easy"
},

/* ================= HUMAN SYSTEMS (56–70) ================= */
{
q:"Alveoli function?",
options:["Gas exchange","Blood pumping","Digestion","Filtering"],
answer:"Gas exchange",
explanation:"Oxygen transfer.",
difficulty:"medium"
},
{
q:"Heart pumps?",
options:["Blood","Air","Food","Water"],
answer:"Blood",
explanation:"Circulates oxygen.",
difficulty:"easy"
},
{
q:"Red blood cells carry?",
options:["Oxygen","Sugar","Water","Hormones"],
answer:"Oxygen",
explanation:"Via hemoglobin.",
difficulty:"easy"
},

/* ================= PHOTOSYNTHESIS / RESPIRATION (71–85) ================= */
{
q:"Photosynthesis produces?",
options:["Glucose","Protein","Fat","Urea"],
answer:"Glucose",
explanation:"Energy source.",
difficulty:"easy"
},
{
q:"Respiration releases?",
options:["Energy","Water only","Light","Oxygen"],
answer:"Energy",
explanation:"ATP production.",
difficulty:"easy"
},
{
q:"Aerobic respiration needs?",
options:["Oxygen","CO2","Nitrogen","Helium"],
answer:"Oxygen",
explanation:"Efficient energy.",
difficulty:"medium"
},

/* ================= ENZYMES / ECOLOGY (86–100) ================= */
{
q:"Enzymes are?",
options:["Proteins","Fats","Sugars","DNA"],
answer:"Proteins",
explanation:"Catalysts.",
difficulty:"medium"
},
{
q:"Enzyme activity affected by?",
options:["Temperature","Color","Weight","Sound"],
answer:"Temperature",
explanation:"Heat affects shape.",
difficulty:"medium"
},
{
q:"Ecosystem includes?",
options:["Living + non-living","Only animals","Only plants","Only bacteria"],
answer:"Living + non-living",
explanation:"All interactions.",
difficulty:"easy"
},
{
q:"Food chain starts with?",
options:["Producers","Consumers","Decomposers","Predators"],
answer:"Producers",
explanation:"Plants start chain.",
difficulty:"easy"
},

{
q:"Decomposers break down?",
options:["Dead matter","Sunlight","Air","Water"],
answer:"Dead matter",
explanation:"Recycle nutrients.",
difficulty:"easy"
}

];

let current=null;
let stats=JSON.parse(localStorage.getItem("bioStats")||"{}");
let startTime=null;
let timer=null;

function startSession(){
startTime=Date.now();
clearInterval(timer);
timer=setInterval(()=>{
document.getElementById("time").innerText=
Math.floor((Date.now()-startTime)/1000);
},1000);
nextQuestion();
updateHistory();
}

function nextQuestion(){
current=questions[Math.floor(Math.random()*questions.length)];
let html=`<h3>${current.q}</h3>`;
current.options.forEach(o=>{
html+=`<label><input type="radio" name="opt" value="${o}">${o}</label>`;
});
html+=`<br><button onclick="check()">Submit</button>`;
document.getElementById("quiz").innerHTML=html;
}

function check(){
let sel=document.querySelector('input[name="opt"]:checked');
if(!sel)return alert("Select");
let correct=sel.value===current.answer;

document.getElementById("feedback").innerHTML=correct?"Correct":"Wrong";
document.getElementById("explanation").innerHTML=current.explanation;

stats[current.q]=stats[current.q]||{correct:0,total:0};
stats[current.q].total++;
if(correct)stats[current.q].correct++;

localStorage.setItem("bioStats",JSON.stringify(stats));
updateHistory();
}

function updateHistory(){
let arr=Object.keys(stats).map(q=>{
let s=stats[q];
return{q,percent:Math.round((s.correct/s.total)*100)};
});
arr.sort((a,b)=>a.percent-b.percent);

document.getElementById("history").innerHTML=
"<table><tr><th>Q</th><th>%</th></tr>"+
arr.map(a=>`<tr><td>${a.q}</td><td>${isNaN(a.percent)?0:a.percent}%</td></tr>`).join("")+
"</table>";
}

function resetData(){
localStorage.removeItem("bioStats");
stats={};
updateHistory();
}

updateHistory();

</script>

</body>
</html>
