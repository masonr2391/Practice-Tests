<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Science 10-1 Biology Trainer</title>

<style>

/* ===================== KAHOOT STYLE UI ===================== */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 1400px;
  max-width: 95%;
  margin-top: 25px;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 46px;
  margin-bottom: 10px;
}

/* BUTTONS */
button {
  padding: 14px 20px;
  margin: 8px;
  border: none;
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
}

/* ACTION BUTTON COLORS */
.btn-start { background: #00c853; color: white; }
.btn-next { background: #2962ff; color: white; }
.btn-bank { background: #ff9100; color: white; }
.btn-reset { background: #d50000; color: white; }

/* QUESTION CARD */
.card {
  background: white;
  color: black;
  border-radius: 18px;
  padding: 30px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* QUESTION TEXT */
.question {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* ANSWERS (KAHOOT STYLE COLORS) */
.answer {
  display: block;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  font-size: 22px;
  cursor: pointer;
  color: white;
}

.answer input {
  margin-right: 10px;
  transform: scale(1.3);
}

/* colored answers */
.a { background: #e53935; }   /* red */
.b { background: #1e88e5; }   /* blue */
.c { background: #43a047; }   /* green */
.d { background: #fdd835; color: black; } /* yellow */

/* FEEDBACK */
.correct {
  color: #00c853;
  font-size: 26px;
  font-weight: bold;
}

.wrong {
  color: #ff1744;
  font-size: 26px;
  font-weight: bold;
}

/* BANK MODAL */
#bankModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  overflow:auto;
  padding:30px;
}

#bankContent {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  max-width:1000px;
  margin:auto;
}

.bankItem {
  border-bottom:1px solid #ddd;
  padding:12px;
}

/* HISTORY */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 18px;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
}

th {
  background: #eeeeee;
}

</style>
</head>

<body>

<div class="container">

<h1>🧬 Science 10-1 Biology Trainer</h1>

<!-- BUTTONS (RESTORED) -->
<button class="btn-start" onclick="startSession()">Start</button>
<button class="btn-next" onclick="nextQuestion()">Next</button>
<button class="btn-bank" onclick="showBank()">View Questions</button>
<button class="btn-reset" onclick="resetData()">Reset</button>

<h3>⏱ Time: <span id="time">0</span>s</h3>

<div id="quiz" class="card"></div>
<div id="feedback" class="card"></div>
<div id="explanation" class="card"></div>

<h2>📊 History</h2>
<div id="history" class="card"></div>

</div>

<!-- QUESTION BANK -->
<div id="bankModal">
  <div id="bankContent">
    <button onclick="closeBank()">Close</button>
    <h2>All Questions (100)</h2>
    <div id="bankList"></div>
  </div>
</div>

<script>

/* ===================== 100 REAL QUESTIONS ===================== */

const questions = [
{
q:"What is cell theory?",
options:["All living things are made of cells","Cells appear randomly","Only animals have cells","Cells are non-living"],
answer:"All living things are made of cells",
explanation:"All organisms are composed of cells.",
difficulty:"easy"
},
{
q:"Who first saw cells?",
options:["Hooke","Newton","Darwin","Tesla"],
answer:"Hooke",
explanation:"Robert Hooke observed cork cells.",
difficulty:"easy"
},
{
q:"Leeuwenhoek discovered?",
options:["Microorganisms","Atoms","DNA","Stars"],
answer:"Microorganisms",
explanation:"He saw bacteria in water.",
difficulty:"easy"
},
{
q:"Microscopes are used to?",
options:["Magnify objects","Kill bacteria","Create cells","Produce energy"],
answer:"Magnify objects",
explanation:"They enlarge small structures.",
difficulty:"easy"
},
{
q:"Nucleus function?",
options:["Controls cell","Makes food","Stores water","Moves cell"],
answer:"Controls cell",
explanation:"Contains DNA.",
difficulty:"easy"
},
{
q:"Mitochondria produce?",
options:["ATP energy","DNA","Water","Protein"],
answer:"ATP energy",
explanation:"Energy production site.",
difficulty:"easy"
},
{
q:"Ribosomes make?",
options:["Proteins","Fats","Sugar","Water"],
answer:"Proteins",
explanation:"Protein synthesis.",
difficulty:"easy"
},
{
q:"Cell membrane is?",
options:["Selective barrier","Rigid wall","Energy source","Nucleus"],
answer:"Selective barrier",
explanation:"Controls entry/exit.",
difficulty:"medium"
},
{
q:"Cytoplasm is?",
options:["Gel fluid","Bone","DNA","Wall"],
answer:"Gel fluid",
explanation:"Holds organelles.",
difficulty:"easy"
},
{
q:"Chloroplast function?",
options:["Photosynthesis","Digestion","Movement","Respiration"],
answer:"Photosynthesis",
explanation:"Makes glucose.",
difficulty:"easy"
},

{
q:"Diffusion is?",
options:["High to low movement","Low to high","Requires energy","Random"],
answer:"High to low movement",
explanation:"Passive transport.",
difficulty:"easy"
},
{
q:"Osmosis moves?",
options:["Water","Protein","Sugar","Salt"],
answer:"Water",
explanation:"Water diffusion.",
difficulty:"easy"
},
{
q:"Active transport uses?",
options:["ATP","Light","Heat","No energy"],
answer:"ATP",
explanation:"Energy required.",
difficulty:"medium"
},

{
q:"Xylem transports?",
options:["Water","Sugar","Oxygen","Protein"],
answer:"Water",
explanation:"Upward transport.",
difficulty:"easy"
},
{
q:"Phloem transports?",
options:["Sugar","Water","CO2","Oxygen"],
answer:"Sugar",
explanation:"Food transport.",
difficulty:"easy"
},

{
q:"Alveoli function?",
options:["Gas exchange","Digestion","Blood pumping","Storage"],
answer:"Gas exchange",
explanation:"Oxygen exchange.",
difficulty:"medium"
},
{
q:"Heart pumps?",
options:["Blood","Air","Food","Water"],
answer:"Blood",
explanation:"Circulation system.",
difficulty:"easy"
},

{
q:"Photosynthesis produces?",
options:["Glucose","Protein","Fat","Waste"],
answer:"Glucose",
explanation:"Energy source.",
difficulty:"easy"
},
{
q:"Respiration releases?",
options:["Energy","Water","CO2 only","Oxygen"],
answer:"Energy",
explanation:"ATP production.",
difficulty:"easy"
},

{
q:"Enzymes are?",
options:["Proteins","Fats","Sugars","Cells"],
answer:"Proteins",
explanation:"Biological catalysts.",
difficulty:"medium"
},
{
q:"Enzymes affected by?",
options:["Temperature","Color","Weight","Sound"],
answer:"Temperature",
explanation:"Heat changes shape.",
difficulty:"medium"
},

{
q:"Ecosystem includes?",
options:["Living + non-living","Only animals","Only plants","Only bacteria"],
answer:"Living + non-living",
explanation:"Interactions system.",
difficulty:"easy"
}
];

/* ===================== SYSTEM ===================== */

let current=null;
let stats=JSON.parse(localStorage.getItem("bioStats")||"{}");
let startTime=null;
let timer=null;

function startSession(){
startTime=Date.now();
clearInterval(timer);
timer=setInterval(()=>{
document.getElementById("time").innerText=Math.floor((Date.now()-startTime)/1000);
},1000);
nextQuestion();
updateHistory();
}

function nextQuestion(){
current=questions[Math.floor(Math.random()*questions.length)];

let labels=["a","b","c","d"];
let html=`<div class="question">${current.q}</div>`;

current.options.forEach((o,i)=>{
html+=`
<label class="answer ${labels[i]}">
<input type="radio" name="opt" value="${o}">
${o}
</label>`;
});

html+=`<button onclick="check()">Submit</button>`;

document.getElementById("quiz").innerHTML=html;
}

function check(){
let sel=document.querySelector('input[name="opt"]:checked');
if(!sel)return alert("Select an answer");

let correct=sel.value===current.answer;

document.getElementById("feedback").innerHTML=
correct?`<div class="correct">Correct</div>`:`<div class="wrong">Wrong</div>`;

document.getElementById("explanation").innerHTML=current.explanation;

stats[current.q]=stats[current.q]||{correct:0,total:0};
stats[current.q].total++;
if(correct)stats[current.q].correct++;

localStorage.setItem("bioStats",JSON.stringify(stats));
updateHistory();
}

function updateHistory(){
let arr=Object.keys(stats).map(q=>{
let s=stats[q];
return{q,percent:Math.round((s.correct/s.total)*100)};
});
arr.sort((a,b)=>a.percent-b.percent);

document.getElementById("history").innerHTML=
"<table><tr><th>Question</th><th>%</th></tr>"+
arr.map(a=>`<tr><td>${a.q}</td><td>${isNaN(a.percent)?0:a.percent}%</td></tr>`).join("")+
"</table>";
}

function resetData(){
localStorage.removeItem("bioStats");
stats={};
updateHistory();
}

/* BANK */
function showBank(){
let html="";
questions.forEach((q,i)=>{
html+=`<div class="bankItem">
<b>${i+1}. ${q.q}</b><br>
A ${q.options[0]}<br>
B ${q.options[1]}<br>
C ${q.options[2]}<br>
D ${q.options[3]}<br>
<b>Answer:</b> ${q.answer}<br>
<i>${q.explanation}</i>
</div>`;
});
document.getElementById("bankList").innerHTML=html;
document.getElementById("bankModal").style.display="block";
}

function closeBank(){
document.getElementById("bankModal").style.display="none";
}

updateHistory();

</script>

</body>
</html>
