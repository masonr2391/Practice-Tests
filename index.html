<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Science 10-1 Biology Trainer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  color:white;
}

.container { width:1400px; max-width:95%; margin-top:20px; }

h1 { text-align:center; font-size:44px; }

button {
  padding:14px 18px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.btn-start{background:#00c853;}
.btn-next{background:#2962ff;}
.btn-bank{background:#ff9100;}
.btn-reset{background:#d50000;}

.card {
  background:white;
  color:black;
  padding:25px;
  border-radius:16px;
  margin-top:20px;
}

.question { font-size:26px; font-weight:bold; margin-bottom:15px; }

.answer {
  display:block;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.a{background:#e53935;}
.b{background:#1e88e5;}
.c{background:#43a047;}
.d{background:#fdd835;color:black;}

.correct{color:#00c853;font-weight:bold;font-size:22px;}
.wrong{color:#ff1744;font-weight:bold;font-size:22px;}

table{width:100%;background:white;color:black;border-collapse:collapse;}
th,td{padding:10px;border:1px solid #ddd;}

#bankModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
overflow:auto;
padding:20px;
}

#bankContent{
background:white;
color:black;
padding:20px;
border-radius:10px;
max-width:1000px;
margin:auto;
}

.bankItem{border-bottom:1px solid #ddd;padding:10px;}

</style>
</head>

<body>

<div class="container">

<h1>Science 10-1 Biology Trainer</h1>

<button class="btn-start" onclick="startSession()">Start</button>
<button class="btn-next" onclick="nextQuestion()">Next</button>
<button class="btn-bank" onclick="showBank()">View Questions</button>
<button class="btn-reset" onclick="resetData()">Reset</button>

<h3>⏱ Time: <span id="time">0</span>s</h3>

<div id="quiz" class="card"></div>
<div id="feedback" class="card"></div>
<div id="explanation" class="card"></div>
<div id="history" class="card"></div>

</div>

<div id="bankModal">
<div id="bankContent">
<button onclick="closeBank()">Close</button>
<div id="bankList"></div>
</div>
</div>

<script>

/* ===================== 100 REAL BIO QUESTIONS ===================== */

const questions = [

/* CELL THEORY (1–10) */
{q:"What is cell theory?",options:["All living things are made of cells","Cells are non-living","Cells form randomly","Only animals have cells"],answer:"All living things are made of cells"},
{q:"Who first observed cells?",options:["Hooke","Newton","Darwin","Tesla"],answer:"Hooke"},
{q:"Who observed microorganisms?",options:["Leeuwenhoek","Einstein","Curie","Mendel"],answer:"Leeuwenhoek"},
{q:"Microscopes are used to?",options:["Magnify","Destroy","Heat","Freeze"],answer:"Magnify"},
{q:"Cell is the basic unit of?",options:["Life","Energy","Heat","Motion"],answer:"Life"},
{q:"New cells come from?",options:["Existing cells","Air","Dust","Spontaneous"],answer:"Existing cells"},
{q:"Magnification means?",options:["Make larger","Make smaller","Destroy","Move"],answer:"Make larger"},
{q:"Resolution means?",options:["Clarity","Size","Weight","Speed"],answer:"Clarity"},
{q:"Electron microscopes use?",options:["Electrons","Light","Sound","Heat"],answer:"Electrons"},
{q:"Light microscopes use?",options:["Light","Electrons","Gas","Water"],answer:"Light"},

/* ORGANELLES (11–25) */
{q:"Nucleus controls?",options:["Cell activities","Water","Sugar","Heat"],answer:"Cell activities"},
{q:"Mitochondria produce?",options:["ATP","DNA","Sugar","Protein"],answer:"ATP"},
{q:"Ribosomes make?",options:["Proteins","Fats","Water","Gas"],answer:"Proteins"},
{q:"Cell membrane is?",options:["Selective barrier","Wall","Engine","Nucleus"],answer:"Selective barrier"},
{q:"Cytoplasm is?",options:["Gel fluid","Bone","Air","DNA"],answer:"Gel fluid"},
{q:"Chloroplast does?",options:["Photosynthesis","Respiration","Digestion","Movement"],answer:"Photosynthesis"},
{q:"Vacuole stores?",options:["Water","DNA","Protein","Heat"],answer:"Water"},
{q:"Cell wall is found in?",options:["Plants","Animals","Viruses","None"],answer:"Plants"},
{q:"Golgi apparatus?",options:["Packages proteins","Makes DNA","Stores water","Produces energy"],answer:"Packages proteins"},
{q:"ER transports?",options:["Materials","Heat","Light","Gas"],answer:"Materials"},
{q:"Lysosomes break down?",options:["Waste","Protein","DNA","Sugar"],answer:"Waste"},
{q:"Plant cells contain?",options:["Chloroplast","Centrioles","Flagella","None"],answer:"Chloroplast"},
{q:"Animal cells contain?",options:["Centrioles","Cell wall","Chloroplast","Starch"],answer:"Centrioles"},
{q:"DNA is stored in?",options:["Nucleus","Membrane","Wall","Cytoplasm"],answer:"Nucleus"},
{q:"Cell membrane made of?",options:["Lipids","Bone","Glass","Steel"],answer:"Lipids"},

/* TRANSPORT (26–40) */
{q:"Diffusion moves from?",options:["High to low","Low to high","Random","Equal"],answer:"High to low"},
{q:"Osmosis moves?",options:["Water","Protein","Sugar","Salt"],answer:"Water"},
{q:"Active transport uses?",options:["ATP","Light","Heat","None"],answer:"ATP"},
{q:"Endocytosis is?",options:["Cell intake","Cell release","Diffusion","Osmosis"],answer:"Cell intake"},
{q:"Exocytosis is?",options:["Cell release","Cell intake","Energy creation","Division"],answer:"Cell release"},
{q:"Passive transport uses?",options:["No energy","ATP","Light","Heat"],answer:"No energy"},
{q:"Membrane allows?",options:["Selective movement","Everything","Nothing","Only water"],answer:"Selective movement"},
{q:"Concentration gradient is?",options:["Difference in concentration","Temperature","Weight","Size"],answer:"Difference in concentration"},
{q:"Facilitated diffusion uses?",options:["Proteins","ATP","Heat","Light"],answer:"Proteins"},
{q:"Water enters plant cell, it becomes?",options:["Turgid","Dead","Empty","Dry"],answer:"Turgid"},

/* PLANTS (41–55) */
{q:"Xylem transports?",options:["Water","Sugar","Protein","Oxygen"],answer:"Water"},
{q:"Phloem transports?",options:["Sugar","Water","CO2","Heat"],answer:"Sugar"},
{q:"Stomata allow?",options:["Gas exchange","Support","Digestion","Storage"],answer:"Gas exchange"},
{q:"Photosynthesis occurs in?",options:["Chloroplast","Nucleus","Vacuole","Membrane"],answer:"Chloroplast"},
{q:"Plants need?",options:["Sunlight","Only water","Only soil","Only oxygen"],answer:"Sunlight"},
{q:"Photosynthesis produces?",options:["Glucose","Protein","Fat","Waste"],answer:"Glucose"},
{q:"CO2 enters through?",options:["Stomata","Roots","Xylem","Phloem"],answer:"Stomata"},
{q:"Water enters roots by?",options:["Osmosis","Diffusion","Heat","Light"],answer:"Osmosis"},
{q:"Guard cells control?",options:["Stomata","Roots","Stem","Leaves"],answer:"Stomata"},
{q:"Chlorophyll absorbs?",options:["Light","Water","Sugar","Protein"],answer:"Light"},

/* HUMAN SYSTEMS (56–70) */
{q:"Alveoli function?",options:["Gas exchange","Blood pumping","Digestion","Filtering"],answer:"Gas exchange"},
{q:"Heart pumps?",options:["Blood","Air","Food","Water"],answer:"Blood"},
{q:"Red blood cells carry?",options:["Oxygen","Sugar","Heat","DNA"],answer:"Oxygen"},
{q:"Lungs are part of?",options:["Respiratory system","Digestive","Nervous","Muscular"],answer:"Respiratory system"},
{q:"Trachea is also called?",options:["Windpipe","Blood tube","Food pipe","Nerve"],answer:"Windpipe"},
{q:"Arteries carry?",options:["Blood away from heart","Blood to heart","Air","Food"],answer:"Blood away from heart"},
{q:"Veins carry?",options:["Blood to heart","Blood away","Air","Water"],answer:"Blood to heart"},

/* ENERGY (71–85) */
{q:"Photosynthesis uses?",options:["Light energy","Heat","Sound","Gravity"],answer:"Light energy"},
{q:"Respiration produces?",options:["Energy","Glucose","Light","Water only"],answer:"Energy"},
{q:"Aerobic respiration needs?",options:["Oxygen","Carbon","Nitrogen","Helium"],answer:"Oxygen"},
{q:"Anaerobic respiration produces?",options:["Less energy","More energy","No energy","DNA"],answer:"Less energy"},
{q:"ATP is?",options:["Energy molecule","Protein","Sugar","Fat"],answer:"Energy molecule"},
{q:"Glucose is used for?",options:["Energy","Support","Storage only","Heat only"],answer:"Energy"},

/* ECOLOGY (86–100) */
{q:"Ecosystem includes?",options:["Living + non-living","Only animals","Only plants","Only bacteria"],answer:"Living + non-living"},
{q:"Producers are?",options:["Plants","Animals","Humans","Fungi"],answer:"Plants"},
{q:"Consumers eat?",options:["Other organisms","Sunlight","Water","Air"],answer:"Other organisms"},
{q:"Decomposers break down?",options:["Dead matter","Light","Water","Air"],answer:"Dead matter"},
{q:"Food chain starts with?",options:["Producers","Consumers","Decomposers","Predators"],answer:"Producers"},
{q:"Energy flows?",options:["One direction","Backwards","Random","Circular"],answer:"One direction"},
{q:"Carbon cycle includes?",options:["CO2 movement","Water only","Heat only","Protein"],answer:"CO2 movement"},
{q:"Population is?",options:["Same species group","All species","One organism","One cell"],answer:"Same species group"},
{q:"Habitat is?",options:["Where organism lives","Diet","DNA","Energy"],answer:"Where organism lives"},
{q:"Adaptation helps?",options:["Survival","Death","Weakness","Random"],answer:"Survival"}

];

let current=null;
let stats=JSON.parse(localStorage.getItem("bioStats")||"{}");
let startTime=null;
let timer=null;

function startSession(){
startTime=Date.now();
clearInterval(timer);
timer=setInterval(()=>{
document.getElementById("time").innerText=Math.floor((Date.now()-startTime)/1000);
},1000);
nextQuestion();
}

function nextQuestion(){
current=questions[Math.floor(Math.random()*questions.length)];
let html=`<div class="question">${current.q}</div>`;
current.options.forEach(o=>{
html+=`<label>${o}</label>`;
});
document.getElementById("quiz").innerHTML=html;
}

function check(){
let sel=document.querySelector('input[name="opt"]:checked');
if(!sel)return;

let correct=sel.value===current.answer;

document.getElementById("feedback").innerHTML=correct?"Correct":"Wrong";
document.getElementById("explanation").innerHTML=current.explanation;

stats[current.q]=stats[current.q]||{correct:0,total:0};
stats[current.q].total++;
if(correct)stats[current.q].correct++;

localStorage.setItem("bioStats",JSON.stringify(stats));
}

function showBank(){
let html="";
questions.forEach((q,i)=>{
html+=`<div class="bankItem"><b>${i+1}. ${q.q}</b><br>${q.answer}</div>`;
});
document.getElementById("bankList").innerHTML=html;
document.getElementById("bankModal").style.display="block";
}

function closeBank(){
document.getElementById("bankModal").style.display="none";
}

function resetData(){
localStorage.removeItem("bioStats");
stats={};
}

</script>

</body>
</html>
